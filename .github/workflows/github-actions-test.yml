name: github-actions-test

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - name: npm install
        run: |
          make install
        env:
          CI: true  
      - name: Run Linter
        run: |
          make lint
